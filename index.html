<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Attendence portal</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

    <div class="box1">
        <h1>Welcome to Jb knowledge park student Attendence portal</h1>
        <h2> created by : Ujjwal kumar
            &nbsp; &nbsp; &nbsp;&nbsp; Erp no. : 242153
        </h2>
        <img class="logo" src="logo.webp" alt="college logo">
    </div>

    <div class="box btn-click">
        <p> Click here to enter Attendence page </p>

    </div>

    <form hidden id="attend" action="" method="post">
        <label>
            Student Name :
            <input type="text" id="studentName" required name="Student_name" placeholder="enter your name">
        </label>
        <br>
        <label>
            Student Roll.no :
            <input type="number" id="rollNumber" required name="Student_roll_no" placeholder="enter your roll no">
        </label>
        <br>
        <select id="attendanceStatus">
            <option value="Present">Present</option>
            <option value="Absent">Absent</option>
        </select>



        <input class="btn btn-click-2" type="submit" value="Submit">
    </form>

    <div hidden  id="attendanceList">
        <h2 class="bro">Attendance History</h2>
        <button id="loadRecords">Load Records</button>
        <button id="clearDisplay">Clear List</button>
        <button id="deleteDatabase">Clear Database</button>
        <ul id="recordsDisplay"></ul>
    </div>


    <script src="script.js"></script>
</body>

</html>
